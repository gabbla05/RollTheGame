<div class="login-wrapper">

  <div class="brand">
    <h1>👾 RollTheGame</h1>
    <p>Twoja osobista biblioteka gier</p>
  </div>

  <div class="login-card">
    <h2>{{ isLoginMode ? 'Zaloguj się' : 'Stwórz konto' }}</h2>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <input type="text" name="username" [(ngModel)]="user.username" placeholder="Twój Login" required class="input-field">
      <input type="password" name="password" [(ngModel)]="user.password" placeholder="Hasło" required class="input-field">

      <button type="submit" class="btn-giant full-width">
        {{ isLoginMode ? 'Zaloguj' : 'Zarejestruj' }}
      </button>
    </form>

    <div class="toggle-section">
      <p>{{ isLoginMode ? 'Nie masz jeszcze konta?' : 'Masz już konto?' }}</p>
      <button type="button" class="btn-text" (click)="toggleMode()">
        {{ isLoginMode ? 'Zarejestruj się' : 'Zaloguj się' }}
      </button>
    </div>
  </div>

</div>
