<div class="login-container">
  <div class="login-card">
    <h2>Zaloguj się</h2>
    <form (ngSubmit)="onSubmit()">
      <input type="text" name="username" [(ngModel)]="user.username" placeholder="Login" required class="input-field">
      <input type="password" name="password" [(ngModel)]="user.password" placeholder="Hasło" required class="input-field">
      <button type="submit" class="btn btn-full">Zaloguj</button>
    </form>
  </div>
</div>
