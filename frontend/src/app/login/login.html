<div style="text-align: center; margin-top: 100px;">
  <h2>Zaloguj się do Biblioteki Gier</h2>
  <form (ngSubmit)="onSubmit()">
    <input type="text" name="username" [(ngModel)]="user.username" placeholder="Login" required><br><br>
    <input type="password" name="password" [(ngModel)]="user.password" placeholder="Hasło" required><br><br>
    <button type="submit">Zaloguj</button>
  </form>
</div>
